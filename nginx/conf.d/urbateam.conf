# urbateam.fr — Site principal Next.js
server {
  listen 80;
  server_name urbateam.fr www.urbateam.fr;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name urbateam.fr www.urbateam.fr;

  ssl_certificate /etc/letsencrypt/live/urbateam.fr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/urbateam.fr/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── Compression gzip ──────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript
             application/xml+rss application/atom+xml image/svg+xml;

  # ── En-têtes de sécurité ──────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Cache long pour les assets statiques Next.js ──────────────────────
  # Next.js génère des noms de fichiers hashés → cache 1 an sans risque
  location /_next/static/ {
    proxy_pass http://nextjs:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ── Cache pour les images publiques ───────────────────────────────────
  location /pictures/ {
    root /app/public;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @nextjs;
  }

  location /uploads/ {
    root /app/public;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @nextjs;
  }

  # ── Proxy vers Next.js (reste des requêtes) ───────────────────────────
  location / {
    proxy_pass http://nextjs:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
  }

  location @nextjs {
    proxy_pass http://nextjs:3000;
  }
}

# admin.urbateam.fr — Interface Directus CMS
server {
  listen 80;
  server_name admin.urbateam.fr;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.urbateam.fr;

  ssl_certificate /etc/letsencrypt/live/admin.urbateam.fr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.urbateam.fr/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  gzip on;
  gzip_types application/json application/javascript text/css;

  location / {
    proxy_pass http://directus:8055;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    client_max_body_size 50M;
  }
}

