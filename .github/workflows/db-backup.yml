name: 💾 Supabase Database Backup

on:
  schedule:
    # Déclenchement tous les jours à 3h00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Permet de lancer le backup manuellement depuis GitHub

jobs:
  backup:
    name: 📤 Backup & Commit
    runs-on: ubuntu-latest
    
    # Permission nécessaire pour pousser sur le dépôt GitHub
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour gérer les branches

      - name: ⚙️ Setup Git & Backup Branch
        run: |
          set -eo pipefail
          
          # Configuration de l'identité Git pour le commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Vérifier si la branche backup existe sur le dépôt distant
          git fetch origin
          if git show-ref --quiet refs/remotes/origin/backup; then
            echo "La branche 'backup' existe. Passage sur cette branche..."
            git checkout backup
            git pull origin backup
          else
            echo "La branche 'backup' n'existe pas. Création d'une branche orpheline..."
            git checkout --orphan backup
            git rm -rf .
            mkdir -p db_backups
            touch db_backups/.gitkeep
            git add db_backups/.gitkeep
            git commit -m "Initialisation de la branche de backup"
            git push origin backup
          fi

      - name: 🐘 Install PostgreSQL Client & Dump DB
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          DB_HOST_SECRET: ${{ secrets.SUPABASE_DB_HOST }}
        run: |
          set -eo pipefail
          
          if [ -z "$PGPASSWORD" ] || [ -z "$PROJECT_ID" ]; then
            echo "❌ Erreur : Les secrets SUPABASE_DB_PASSWORD ou SUPABASE_PROJECT_ID ne sont pas configurés dans GitHub Secrets."
            exit 1
          fi

          # Installation du client PostgreSQL 17 depuis le dépôt officiel PostgreSQL
          echo "Configuration du dépôt officiel PostgreSQL..."
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          
          echo "Installation du client PostgreSQL 17..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

          # Créer le répertoire des backups s'il n'existe pas
          mkdir -p db_backups
          
          # Générer le nom de fichier avec la date du jour
          FILENAME="db_backups/backup_$(date +%Y-%m-%d).sql.gz"
          
          # Déterminer les paramètres de connexion
          # Si un host personnalisé est spécifié (ex: le pooler aws-0-eu-west-3.pooler.supabase.com), on utilise le port 6543
          if [ -n "$DB_HOST_SECRET" ]; then
            DB_HOST="$DB_HOST_SECRET"
            DB_PORT="6543"
            DB_USER="postgres.${PROJECT_ID}"
            echo "ℹ️ Connexion via le Pooler de connexion Supabase (IPv4 compatible) :"
            echo "   Host : $DB_HOST"
            echo "   Port : $DB_PORT"
            echo "   User : $DB_USER"
          else
            DB_HOST="db.${PROJECT_ID}.supabase.co"
            DB_PORT="5432"
            DB_USER="postgres"
            echo "⚠️ Connexion directe (IPv6 uniquement pour les projets gratuits) :"
            echo "   Host : $DB_HOST"
            echo "   Port : $DB_PORT"
            echo "   User : $DB_USER"
            echo "   (Si vous rencontrez une erreur 'Network is unreachable', veuillez configurer le secret SUPABASE_DB_HOST)"
          fi

          echo "Démarrage du dump de la base de données Supabase..."
          pg_dump -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres | gzip > "$FILENAME"
          echo "Dump terminé avec succès : $FILENAME"

      - name: 🗑️ Apply 7-day Retention Policy
        run: |
          set -eo pipefail
          echo "Application de la politique de rétention (7 jours)..."
          
          # Lister les fichiers, les trier par date décroissante (les plus récents en premier),
          # et supprimer tous les fichiers à partir de l'index 8 (conserve donc uniquement les 7 plus récents)
          ls -t db_backups/backup_*.sql.gz 2>/dev/null | tail -n +8 | while read -r file; do
            echo "Suppression de l'ancien backup obsolète : $file"
            rm "$file"
          done

      - name: 📤 Push Backup to GitHub
        run: |
          set -eo pipefail
          
          git add db_backups/
          
          # Vérifier s'il y a des modifications à commiter
          if git diff --cached --quiet; then
            echo "Aucun changement détecté dans la base de données. Aucun backup supplémentaire commité aujourd'hui."
          else
            git commit -m "db-backup: sauvegarde automatique du $(date +%Y-%m-%d)"
            git push origin backup
          fi
