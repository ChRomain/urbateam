# docker-compose.prod.yml — Override de production
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    ports: []  # Ne pas exposer le port PostgreSQL en production

  directus:
    restart: always
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: https://admin.urbateam.fr
      CORS_ORIGIN: "https://urbateam.fr"
      CACHE_ENABLED: "true"
      CACHE_TTL: "5m"
    # Pas d'exposition directe — Nginx gère le trafic
    ports: []

  nextjs:
    restart: always
    build:
      args:
        DIRECTUS_URL: http://directus:8055
        NEXT_PUBLIC_DIRECTUS_URL: https://admin.urbateam.fr
        DIRECTUS_API_TOKEN: ${DIRECTUS_API_TOKEN}
    environment:
      DIRECTUS_URL: http://directus:8055
      NEXT_PUBLIC_DIRECTUS_URL: https://admin.urbateam.fr
      DIRECTUS_API_TOKEN: ${DIRECTUS_API_TOKEN}
    ports: []

  # ─── Nginx (reverse proxy + SSL) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: urbateam_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - nextjs
      - directus

  # ─── Certbot (SSL Let's Encrypt) ─────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: urbateam_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot_certs:
  certbot_www:
